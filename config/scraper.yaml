# NitroFind scraper configuration
# Source: CONTEXT.md (D-01, D-03), RESEARCH.md (Pattern 7, Wikipedia Root Category Recommendations)
# Edit this file to change scraper behavior without modifying source code.

wikipedia:
  root_categories:
    - "Category:Automobiles by manufacturer"
    - "Category:Car models"
    - "Category:Sports cars"
    - "Category:Luxury vehicles"
    - "Category:Cars by year of introduction"
  max_depth: 2
  rate_limit_seconds: 0.5  # MediaWiki etiquette — do not reduce below 0.5
  # Supply your own contact address so Wikipedia can reach you if needed.
  # Format: "NitroFind/1.0 (your-email@example.com; personal offline research tool)"
  user_agent: "NitroFind/1.0 (leonardo.otaviano@sou.unifal-mg.edu.br; offline automotive research tool)"

blogs:
  size_halt_bytes: 1800000000  # 1.8 GB — SCRP-04; halts indexing before 2 GB cap
  # Supply your own contact address here (CR-05). Keep the NitroFind/1.0 prefix.
  user_agent: "NitroFind/1.0 (offline automotive research tool)"
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
    Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
    Accept-Language: "en-US,en;q=0.5"
  targets:
    - name: hagerty
      enabled: true
      base_url: "https://www.hagerty.com/media/"
      sitemap_index_url: "https://www.hagerty.com/media/sitemap_index.xml"  # ~36K articles
      article_list_url: "https://www.hagerty.com/media/all-articles/"       # fallback if sitemap fails
      article_selector: "div.article_body"    # VERIFIED 2026-05-14
      listing_selector: "a.card_title"        # VERIFIED 2026-05-14
    - name: caranddriver
      enabled: true
      base_url: "https://www.caranddriver.com/"
      article_list_url: "https://www.caranddriver.com/news/"
      article_selector: "div.article-body-content"                    # VERIFIED 2026-05-14
      listing_selector: "a[href*='/news/a']"                          # UPDATED 2026-05-18 (attr value changed)
    - name: hemmings
      enabled: true
      base_url: "https://www.hemmings.com/stories/"
      article_list_url: "https://www.hemmings.com/stories/"
      article_selector: "div.entry-content"      # VERIFIED 
      listing_selector: "article.card a.card__link"           #  VERIFIED