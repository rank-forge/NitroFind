# Source: CLAUDE.md L-01; ES 8.19 docs (single-node + security disabled)
# Place in: $ES_HOME/config/elasticsearch.yml via scripts/setup_es.py
# Pitfall 2: discovery.type: single-node required or ES hangs on quorum wait
# Pitfall 3: all three security ssl settings required to avoid keystore conflict
network.host: 127.0.0.1
http.port: 9200
discovery.type: single-node
xpack.security.enabled: false
xpack.security.http.ssl.enabled: false
xpack.security.transport.ssl.enabled: false
# Local desktop tool with a 2 GB index cap: prefer absolute free-space watermarks
# so shard allocation is not blocked just because the home partition is >90% used.
cluster.routing.allocation.disk.watermark.low: 10gb
cluster.routing.allocation.disk.watermark.high: 5gb
cluster.routing.allocation.disk.watermark.flood_stage: 2gb
