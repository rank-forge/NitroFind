<!DOCTYPE html>
<html lang="en" data-intro="active">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NitroFind</title>
  <script>
    (function () {
      var t = localStorage.getItem('nitrofind-theme');
      document.documentElement.dataset.theme = (t === 'light') ? 'light' : 'dark';
      document.documentElement.dataset.intro = window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 'done' : 'active';
    }());
  </script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body data-state="home">

  <!-- Scrollytelling intro: instant poster -> scroll-scrubbed video -> veil reveal of .home-view -->
  <div class="intro-scroller" aria-hidden="true">
    <div class="intro-stage">
      <img class="intro-poster" id="intro-poster" src="/static/media/carro-poster.webp" alt="">
      <video id="intro-video" class="intro-video" muted playsinline preload="auto">
        <source src="/static/media/carro-scroll.mp4" type="video/mp4">
      </video>
      <div class="intro-veil"></div>
      <div class="intro-hint">Role para explorar<span class="intro-hint-arrow"></span></div>
    </div>
  </div>

  <!-- Home view: centered logo + search box -->
  <div class="home-view">
    <button id="theme-toggle" type="button" class="theme-toggle-btn">Light</button>
    <h1 class="logo">NitroFind</h1>
    <div class="search-wrap">
      <input id="search-input" type="search" placeholder="Search cars…" autocomplete="off" disabled>
      <p id="status-line">Starting up…</p>
    </div>
    <ul id="history-list" style="display:none;"></ul>
  </div>

  <!-- Results view: top bar + filter row + results list -->
  <div class="results-view">
    <header class="top-bar">
      <span class="logo-small">NitroFind</span>
      <input id="search-input-results" type="search" placeholder="Search cars…" autocomplete="off">
      <button id="theme-toggle-results" type="button" class="theme-toggle-btn">Light</button>
    </header>
    <div class="filter-row">
      <select id="filter-manufacturer">
        <option value="">All manufacturers</option>
      </select>
      <select id="filter-era">
        <option value="">All eras</option>
        <option value="1950s">1950s</option>
        <option value="1960s">1960s</option>
        <option value="1970s">1970s</option>
        <option value="1980s">1980s</option>
        <option value="1990s">1990s</option>
        <option value="2000s">2000s</option>
        <option value="2010s">2010s</option>
        <option value="2020s">2020s</option>
      </select>
      <select id="filter-body">
        <option value="">All body styles</option>
        <option value="coupe">Coupe</option>
        <option value="sedan">Sedan</option>
        <option value="hatchback">Hatchback</option>
        <option value="convertible">Convertible</option>
        <option value="SUV">SUV</option>
        <option value="truck">Truck</option>
      </select>
      <input id="filter-year-from" type="number" placeholder="Year from"
             min="1900" max="2099" step="1">
      <input id="filter-year-to"   type="number" placeholder="Year to"
             min="1900" max="2099" step="1">
      <input id="filter-country"   type="text"   placeholder="e.g. Germany">
      <div class="sort-controls">
        <button type="button" class="sort-btn active" data-sort="relevance">Relevance</button>
        <button type="button" class="sort-btn" data-sort="date">Newest</button>
        <button type="button" class="sort-btn" data-sort="size">Largest</button>
      </div>
    </div>
    <p id="stats-line"></p>
    <div id="results-list"></div>
    <div class="pagination-row" id="pagination-row">
      <button type="button" id="prev-btn" disabled>&#8592; Previous</button>
      <button type="button" id="next-btn">Next &#8594;</button>
    </div>
  </div>

  <!-- Article view: Archive dossier -->
  <div class="article-view">
    <header class="dossier-topbar">
      <button id="back-btn" type="button" aria-label="Back to results">&#8592; Back</button>
      <span id="article-source"></span>
    </header>

    <section class="dossier-hero">
      <figure class="dossier-photo">
        <div id="article-photo-placeholder" class="dossier-photo-placeholder"></div>
        <img id="article-photo" alt="">
      </figure>

      <div class="dossier-identity">
        <p id="article-era" class="dossier-kicker"></p>
        <h2 id="article-title"></h2>
        <p id="article-summary" class="dossier-summary"></p>
        <dl id="article-specs" class="dossier-specs"></dl>
      </div>
    </section>

    <article id="article-body" class="dossier-body"></article>
  </div>

  <div id="transition-overlay" class="transition-overlay" aria-hidden="true">
    <video id="speedometer-video" preload="auto" playsinline>
      <source src="/static/media/videoVeloIntro.mp4" type="video/mp4">
    </video>
  </div>

  <script src="/static/js/intro.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
